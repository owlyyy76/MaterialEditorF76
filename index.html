<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>f76.world | Material Engine</title>
    
    <!-- Systemic Decoupling: Resilient CDNs -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
</head>
<body class="bg-neutral-950 text-neutral-200 overflow-y-scroll">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect, useCallback } = React;

        // --- INLINE VECTOR OPTICS ---
        const Cpu = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="16" height="16" x="4" y="4" rx="2" ry="2"/><rect width="6" height="6" x="9" y="9" rx="1"/><path d="M15 2v2"/><path d="M15 20v2"/><path d="M2 15h2"/><path d="M2 9h2"/><path d="M20 15h2"/><path d="M20 9h2"/><path d="M9 2v2"/><path d="M9 20v2"/></svg>;
        const UploadCloud = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"/><path d="M12 12v9"/><path d="m16 16-4-4-4 4"/></svg>;
        const Save = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>;
        const AlertTriangle = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>;
        const FileCode = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><path d="m10 13-2 2 2 2"/><path d="m14 17 2-2-2-2"/></svg>;
        const Settings2 = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 7h-9"/><path d="M14 17H5"/><circle cx="17" cy="17" r="3"/><circle cx="7" cy="7" r="3"/></svg>;
        const Layers = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>;
        const Undo = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg>;
        const Redo = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 7v6h-6"/><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3l3 2.7"/></svg>;
        const ShieldCheck = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></svg>;
        const Code = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>;
        const HelpCircle = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><path d="M12 17h.01"/></svg>;
        const Terminal = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>;

        // --- MAIN APPLICATION ---
        function App() {
            // File & Core State
            const [fileData, setFileData] = useState(null);
            const [parsedData, setParsedData] = useState(null);
            const [isDragging, setIsDragging] = useState(false);
            const [error, setError] = useState(null);
            
            // UX State
            const [loadingProgress, setLoadingProgress] = useState(0);
            const [isProcessing, setIsProcessing] = useState(false);
            
            // Undo/Redo Matrix State
            const [history, setHistory] = useState([]);
            const [historyPos, setHistoryPos] = useState(-1);

            // Active Tab State
            const [activeTab, setActiveTab] = useState('visual'); // 'visual', 'raw', 'verifier'

            // Verbose Logger
            const [debugLogs, setDebugLogs] = useState([]);
            
            const fileInputRef = useRef(null);

            const pushLog = useCallback((level, message) => {
                const timestamp = new Date().toISOString().split('T')[1].slice(0, -1);
                const newLog = { timestamp, level, message };
                setDebugLogs(prev => [...prev, newLog]);
                
                // Verbose Console Mirroring
                const prefix = `[${timestamp}] [${level}]`;
                if (level === 'ERROR') console.error(`${prefix} ${message}`);
                else if (level === 'WARN') console.warn(`${prefix} ${message}`);
                else if (level === 'DEBUG') console.debug(`${prefix} ${message}`);
                else console.log(`${prefix} ${message}`);
            }, []);

            // Helper to simulate asynchronous heavy lifting for UI feedback
            const delay = (ms) => new Promise(resolve => setTimeout(resolve, ms));

            const commitState = (newTextures) => {
                const newHistory = history.slice(0, historyPos + 1);
                newHistory.push([...newTextures]);
                setHistory(newHistory);
                setHistoryPos(newHistory.length - 1);
                pushLog('INFO', 'State matrix updated. History buffer appended.');
            };

            const undo = () => {
                if (historyPos > 0) {
                    setHistoryPos(historyPos - 1);
                    pushLog('INFO', 'State matrix reverted (Undo).');
                }
            };

            const redo = () => {
                if (historyPos < history.length - 1) {
                    setHistoryPos(historyPos + 1);
                    pushLog('INFO', 'State matrix restored (Redo).');
                }
            };

            const runRobustHeuristics = async (buffer) => {
                pushLog('INFO', 'Initiating Fallback/Heuristics parsing protocol...');
                setLoadingProgress(20);
                await delay(100);

                if (!buffer || buffer.byteLength === 0) {
                    throw new Error("Critical File Error: Buffer is empty (0 bytes). File may be corrupted or locked by another process.");
                }

                if (buffer.byteLength < 8) {
                    throw new Error(`Buffer underflow: Size ${buffer.byteLength} bytes is smaller than standard Bethesda header (8 bytes).`);
                }

                pushLog('DEBUG', `Buffer instantiated. Byte length: ${buffer.byteLength}`);
                setLoadingProgress(40);
                await delay(100);

                const view = new DataView(buffer);
                const magic = String.fromCharCode(view.getUint8(0), view.getUint8(1), view.getUint8(2), view.getUint8(3));
                
                if (magic !== 'BGSM' && magic !== 'BGEM') {
                    throw new Error(`Corrupt Magic Header: Expected BGSM/BGEM, identified '${magic}'. This is not a standard material file.`);
                }
                pushLog('SUCCESS', `Validated Magic Header: ${magic}`);

                const version = view.getUint32(4, true);
                pushLog('INFO', `Detected Schema Version: v${version}`);
                setLoadingProgress(60);
                await delay(100);

                pushLog('DEBUG', 'Executing topological string extraction via RegExp...');
                const decoder = new TextDecoder('ascii');
                const text = decoder.decode(buffer);
                
                // Advanced regex to capture paths safely
                const pathRegex = /([a-zA-Z0-9_\\\-\.\/]+(?:textures|materials)[a-zA-Z0-9_\\\-\.\/]+\.(?:dds|bgsm|bgem))/gi;
                
                const textures = [];
                let match;
                while ((match = pathRegex.exec(text)) !== null) {
                    if (!textures.includes(match[1])) {
                        textures.push(match[1]);
                        pushLog('DEBUG', `Mapped Texture Slot: ${match[1]}`);
                    }
                }

                if (textures.length === 0) {
                    pushLog('WARN', 'No parsable texture paths detected in buffer.');
                } else {
                    pushLog('SUCCESS', `Extraction complete. Captured ${textures.length} valid mapped nodes.`);
                }

                setLoadingProgress(100);
                await delay(200); // Allow bar to finish animating

                return { magic, version, textures, rawBuffer: buffer };
            };

            const processFile = async (file) => {
                if (!file) return;
                
                setError(null);
                setParsedData(null);
                setDebugLogs([]); // Clear previous logs
                setIsProcessing(true);
                setLoadingProgress(0);
                
                pushLog('INFO', `Ingesting artifact: ${file.name} (${file.size} bytes)`);

                try {
                    setLoadingProgress(10);
                    const buffer = await file.arrayBuffer();
                    
                    const data = await runRobustHeuristics(buffer);
                    
                    setFileData({
                        name: file.name,
                        size: (file.size / 1024).toFixed(2) + ' KB',
                        lastModified: new Date(file.lastModified).toLocaleDateString()
                    });
                    
                    setParsedData(data);
                    
                    setHistory([data.textures]);
                    setHistoryPos(0);
                    pushLog('SUCCESS', 'Artifact initialization and DOM mounting complete.');
                    
                } catch (err) {
                    pushLog('ERROR', err.message);
                    setError(err.message);
                    setParsedData(null);
                    setFileData(null);
                } finally {
                    setIsProcessing(false);
                    setLoadingProgress(0);
                }
            };

            const handleDragOver = (e) => {
                e.preventDefault();
                setIsDragging(true);
            };

            const handleDragLeave = () => {
                setIsDragging(false);
            };

            const handleDrop = (e) => {
                e.preventDefault();
                setIsDragging(false);
                if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
                    processFile(e.dataTransfer.files[0]);
                }
            };

            const handleFileSelect = (e) => {
                const file = e.target.files[0];
                if (file) {
                    processFile(file);
                }
                if (fileInputRef.current) {
                    fileInputRef.current.value = '';
                }
            };

            const handleTextureChange = (index, newValue) => {
                const currentTextures = history[historyPos];
                const newTextures = [...currentTextures];
                newTextures[index] = newValue;
                commitState(newTextures);
            };

            const handleRawTextChange = (e) => {
                const lines = e.target.value.split('\n');
                commitState(lines);
            };

            const handleExport = () => {
                if (!parsedData) return;
                
                pushLog('INFO', 'User initiated export sequence.');
                const confirmSave = window.confirm("SECURITY WARNING:\nHave you created a backup of the original .bgsm file?\nModifying material byte offsets incorrectly can crash the game.\n\nProceed with export?");
                
                if (!confirmSave) {
                    pushLog('WARN', 'Export aborted by user security prompt.');
                    return;
                }

                try {
                    const blob = new Blob([parsedData.rawBuffer], { type: 'application/octet-stream' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `f76world_${fileData.name}`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                    pushLog('SUCCESS', `Artifact successfully committed to local disk as f76world_${fileData.name}`);
                } catch (err) {
                    pushLog('ERROR', `Export failed: ${err.message}`);
                    alert(`Export Failed: ${err.message}`);
                }
            };

            const activeTextures = historyPos >= 0 ? history[historyPos] : [];

            const renderingFlags = [
                { name: 'Alpha Blend', desc: 'Enables partial transparency (glass, water).' },
                { name: 'Alpha Test', desc: 'Hard cut-off transparency (leaves, fences).' },
                { name: 'Z-Buffer Write', desc: 'Forces object to occlude geometry behind it.' },
                { name: 'Double Sided', desc: 'Renders backfaces of the mesh.' },
                { name: 'Environment Map', desc: 'Enables cubemap reflections.' },
                { name: 'Two Sided', desc: 'Lighting calculated for both sides.' }
            ];

            return (
                <div className="min-h-screen flex flex-col bg-neutral-950 text-neutral-200 font-sans selection:bg-emerald-500/30">
                    
                    {/* TOP NAVIGATION */}
                    <nav className="relative border-b border-emerald-900/30 bg-neutral-900/80 backdrop-blur-md sticky top-0 z-50 shadow-md">
                        {/* Global Progress Bar */}
                        {isProcessing && (
                            <div className="absolute bottom-0 left-0 h-0.5 bg-emerald-500 transition-all duration-300 ease-out z-50 shadow-[0_0_8px_rgba(16,185,129,0.8)]" style={{ width: `${loadingProgress}%` }}></div>
                        )}
                        
                        <div className="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <div className="w-8 h-8 rounded bg-emerald-600 flex items-center justify-center shadow-[0_0_15px_rgba(16,185,129,0.4)]">
                                    <Cpu className="w-5 h-5 text-white" />
                                </div>
                                <h1 className="font-bold text-xl tracking-tight bg-gradient-to-r from-emerald-100 to-emerald-400 bg-clip-text text-transparent">
                                    f76.world <span className="font-light text-neutral-400 ml-1">| Material Engine</span>
                                </h1>
                            </div>

                            {/* Center: Undo/Redo Matrix */}
                            {parsedData && (
                                <div className="flex items-center gap-2 bg-neutral-800 p-1 rounded-lg border border-neutral-700">
                                    <div className="relative group">
                                        <button 
                                            onClick={undo} 
                                            disabled={historyPos <= 0}
                                            className={`p-1.5 rounded transition-colors ${historyPos > 0 ? 'hover:bg-neutral-700 text-neutral-200' : 'text-neutral-600 cursor-not-allowed'}`}
                                        >
                                            <Undo className="w-4 h-4" />
                                        </button>
                                        <span className="absolute -bottom-8 left-1/2 -translate-x-1/2 whitespace-nowrap bg-neutral-900 border border-neutral-700 text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none">Undo Change</span>
                                    </div>
                                    <div className="w-px h-4 bg-neutral-700"></div>
                                    <div className="relative group">
                                        <button 
                                            onClick={redo} 
                                            disabled={historyPos >= history.length - 1}
                                            className={`p-1.5 rounded transition-colors ${historyPos < history.length - 1 ? 'hover:bg-neutral-700 text-neutral-200' : 'text-neutral-600 cursor-not-allowed'}`}
                                        >
                                            <Redo className="w-4 h-4" />
                                        </button>
                                        <span className="absolute -bottom-8 left-1/2 -translate-x-1/2 whitespace-nowrap bg-neutral-900 border border-neutral-700 text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none">Redo Change</span>
                                    </div>
                                </div>
                            )}

                            <div className="flex items-center gap-4">
                                <div className="relative group">
                                    <button onClick={() => fileInputRef.current?.click()} disabled={isProcessing} className="px-4 py-2 rounded-md bg-neutral-800 hover:bg-neutral-700 disabled:opacity-50 text-sm font-medium transition-colors border border-neutral-700 flex items-center gap-2">
                                        <UploadCloud className="w-4 h-4" />
                                        Load .BGSM
                                    </button>
                                    <span className="absolute -bottom-10 right-0 whitespace-nowrap bg-neutral-900 border border-neutral-700 text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none shadow-lg z-50">Local Memory Ingestion</span>
                                </div>
                                <input type="file" ref={fileInputRef} onChange={handleFileSelect} accept=".bgsm,.bgem" className="hidden" />
                                
                                <div className="relative group">
                                    <button 
                                        onClick={handleExport} 
                                        disabled={!parsedData || isProcessing} 
                                        className={`px-4 py-2 rounded-md text-sm font-medium transition-all flex items-center gap-2 ${parsedData && !isProcessing ? 'bg-emerald-600 hover:bg-emerald-500 text-white shadow-[0_0_10px_rgba(16,185,129,0.3)]' : 'bg-neutral-800 text-neutral-500 cursor-not-allowed opacity-50 border border-neutral-700'}`}
                                    >
                                        <Save className="w-4 h-4" />
                                        Save Artifact
                                    </button>
                                    <span className="absolute -bottom-10 right-0 whitespace-nowrap bg-neutral-900 border border-neutral-700 text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none shadow-lg z-50">Export to Disk (Backup Recommended)</span>
                                </div>
                            </div>
                        </div>
                    </nav>

                    <main className="flex-grow max-w-7xl w-full mx-auto px-4 py-8 flex flex-col">
                        {error && (
                            <div className="mb-6 p-4 rounded-lg bg-red-900/20 border border-red-900/50 flex items-start gap-3 animate-in fade-in slide-in-from-top-2">
                                <AlertTriangle className="w-5 h-5 text-red-500 flex-shrink-0 mt-0.5" />
                                <div>
                                    <h3 className="text-red-400 font-medium">Critical Telemetry Failure</h3>
                                    <p className="text-red-300/80 text-sm mt-1 font-mono break-all">{error}</p>
                                </div>
                            </div>
                        )}

                        {/* INITIAL DROPZONE */}
                        {!parsedData && !error && (
                            <div 
                                onDragOver={handleDragOver} 
                                onDragLeave={handleDragLeave} 
                                onDrop={handleDrop} 
                                className={`flex-grow min-h-[500px] w-full rounded-2xl border-2 border-dashed flex flex-col items-center justify-center transition-all duration-300 ${isDragging ? 'border-emerald-500 bg-emerald-500/10 scale-[1.02]' : 'border-neutral-800 bg-neutral-900/30 hover:bg-neutral-800/30 hover:border-neutral-700'}`}
                            >
                                <div className={`p-5 rounded-full bg-neutral-900 border mb-6 shadow-2xl transition-colors duration-300 ${isDragging ? 'border-emerald-500/50' : 'border-neutral-800'}`}>
                                    <UploadCloud className={`w-12 h-12 transition-colors duration-300 ${isDragging ? 'text-emerald-400' : 'text-neutral-500'}`} />
                                </div>
                                <h2 className="text-2xl font-bold mb-3 tracking-tight text-neutral-300">Awaiting Material Payload</h2>
                                <p className="text-neutral-500 max-w-md text-center leading-relaxed">
                                    Drag and drop a Fallout 76 <span className="font-mono text-emerald-400 bg-emerald-900/20 px-1 rounded">.bgsm</span> or <span className="font-mono text-emerald-400 bg-emerald-900/20 px-1 rounded">.bgem</span> file here to begin safe-mode editing.
                                </p>
                            </div>
                        )}

                        {/* EDITOR INTERFACE */}
                        {parsedData && (
                            <div className="animate-in fade-in slide-in-from-bottom-4 duration-500 flex-grow flex flex-col">
                                
                                {/* TAB SELECTOR */}
                                <div className="flex gap-2 mb-6 border-b border-neutral-800 pb-px">
                                    <button onClick={() => setActiveTab('visual')} className={`px-4 py-2 text-sm font-medium border-b-2 transition-colors flex items-center gap-2 ${activeTab === 'visual' ? 'border-emerald-500 text-emerald-400' : 'border-transparent text-neutral-500 hover:text-neutral-300'}`}>
                                        <Layers className="w-4 h-4" /> Visual Editor
                                    </button>
                                    <button onClick={() => setActiveTab('raw')} className={`px-4 py-2 text-sm font-medium border-b-2 transition-colors flex items-center gap-2 ${activeTab === 'raw' ? 'border-emerald-500 text-emerald-400' : 'border-transparent text-neutral-500 hover:text-neutral-300'}`}>
                                        <Code className="w-4 h-4" /> Raw String Data
                                    </button>
                                    <button onClick={() => setActiveTab('verifier')} className={`px-4 py-2 text-sm font-medium border-b-2 transition-colors flex items-center gap-2 ${activeTab === 'verifier' ? 'border-emerald-500 text-emerald-400' : 'border-transparent text-neutral-500 hover:text-neutral-300'}`}>
                                        <Terminal className="w-4 h-4" /> Verifier & Logs
                                    </button>
                                </div>

                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 flex-grow">
                                    
                                    {/* LEFT COLUMN: DIAGNOSTICS & FLAGS */}
                                    <div className="space-y-6">
                                        <div className="bg-neutral-900 border border-neutral-800 rounded-xl overflow-hidden shadow-lg">
                                            <div className="border-b border-neutral-800 bg-neutral-900 px-4 py-3 flex items-center justify-between">
                                                <div className="flex items-center gap-2">
                                                    <FileCode className="w-4 h-4 text-emerald-500" />
                                                    <h3 className="font-medium text-sm text-neutral-200">Active Artifact</h3>
                                                </div>
                                            </div>
                                            <div className="p-4 space-y-4">
                                                <div>
                                                    <label className="text-[10px] text-neutral-500 font-bold uppercase tracking-wider">File Designation</label>
                                                    <div className="mt-1 font-mono text-sm text-neutral-300 truncate" title={fileData?.name}>{fileData?.name}</div>
                                                </div>
                                                <div className="grid grid-cols-2 gap-4">
                                                    <div>
                                                        <label className="text-[10px] text-neutral-500 font-bold uppercase tracking-wider">Size</label>
                                                        <div className="mt-1 font-mono text-sm text-neutral-300">{fileData?.size}</div>
                                                    </div>
                                                    <div>
                                                        <label className="text-[10px] text-neutral-500 font-bold uppercase tracking-wider">Schema</label>
                                                        <div className="mt-1 font-mono text-sm text-neutral-300">v{parsedData.version}</div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>

                                        <div className="bg-neutral-900 border border-neutral-800 rounded-xl overflow-hidden shadow-lg">
                                            <div className="border-b border-neutral-800 bg-neutral-900 px-4 py-3 flex items-center gap-2">
                                                <Settings2 className="w-4 h-4 text-emerald-500" />
                                                <h3 className="font-medium text-sm text-neutral-200">Rendering Flags</h3>
                                            </div>
                                            <div className="p-4 flex flex-col gap-4">
                                                {renderingFlags.map((flag, i) => (
                                                    <div key={i} className="flex items-start gap-3 group/flag">
                                                        <input type="checkbox" defaultChecked={i % 2 === 0} className="mt-1 w-4 h-4 rounded border-neutral-700 bg-neutral-800 text-emerald-500 focus:ring-emerald-500 focus:ring-offset-neutral-900 cursor-pointer" />
                                                        <div>
                                                            <div className="flex items-center gap-2">
                                                                <span className="text-sm font-medium text-neutral-300 group-hover/flag:text-white transition-colors">{flag.name}</span>
                                                                <HelpCircle className="w-3 h-3 text-neutral-600 opacity-0 group-hover/flag:opacity-100 transition-opacity" />
                                                            </div>
                                                            <p className="text-xs text-neutral-500 mt-0.5">{flag.desc}</p>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>

                                    {/* RIGHT COLUMN: DYNAMIC TABS */}
                                    <div className="lg:col-span-2 flex flex-col">
                                        
                                        {/* TAB 1: VISUAL EDITOR */}
                                        {activeTab === 'visual' && (
                                            <div className="bg-neutral-900 border border-neutral-800 rounded-xl overflow-hidden shadow-lg animate-in fade-in flex-grow">
                                                <div className="border-b border-neutral-800 bg-neutral-900 px-4 py-3 flex items-center justify-between">
                                                    <div className="flex items-center gap-2">
                                                        <Layers className="w-4 h-4 text-emerald-500" />
                                                        <h3 className="font-medium text-sm text-neutral-200">Texture Map Allocations</h3>
                                                    </div>
                                                    <span className="text-xs font-mono bg-neutral-800 px-2 py-1 rounded text-neutral-400 border border-neutral-700">{activeTextures.length} VALID PATHS</span>
                                                </div>
                                                <div className="p-6 space-y-6">
                                                    {activeTextures.map((tex, index) => {
                                                        let label = "Texture Data";
                                                        if (tex.toLowerCase().includes('_d.') || tex.toLowerCase().includes('_color')) label = "Diffuse Map (Color)";
                                                        else if (tex.toLowerCase().includes('_n.') || tex.toLowerCase().includes('_normal')) label = "Normal Map (Bump)";
                                                        else if (tex.toLowerCase().includes('_s.') || tex.toLowerCase().includes('_spec')) label = "Specular Map (Shine)";
                                                        else if (tex.toLowerCase().includes('_g.') || tex.toLowerCase().includes('_glow')) label = "Glow Map (Emissive)";
                                                        else if (tex.toLowerCase().includes('_l.') || tex.toLowerCase().includes('_light')) label = "Lighting Map";
                                                        
                                                        return (
                                                            <div key={index} className="group">
                                                                <div className="flex justify-between items-end mb-2">
                                                                    <label className="flex items-center gap-2 text-xs font-bold text-neutral-400 uppercase tracking-wider">
                                                                        {label}
                                                                        <div className="relative flex items-center justify-center group/tooltip">
                                                                            <HelpCircle className="w-3.5 h-3.5 text-neutral-600 hover:text-emerald-400 cursor-help" />
                                                                            <div className="absolute bottom-full mb-2 hidden group-hover/tooltip:block w-48 bg-neutral-800 text-neutral-300 text-[10px] p-2 rounded border border-neutral-700 shadow-xl z-10 normal-case tracking-normal font-normal">
                                                                                Defines the file path to the .DDS texture loaded by the Creation Engine. Modifying this redirects the shader.
                                                                            </div>
                                                                        </div>
                                                                    </label>
                                                                    <span className="text-neutral-600 font-mono text-[10px] bg-neutral-950 px-1.5 py-0.5 rounded border border-neutral-800">INDEX {index}</span>
                                                                </div>
                                                                <div className="relative group/input">
                                                                    <input 
                                                                        type="text" 
                                                                        value={tex} 
                                                                        onChange={(e) => handleTextureChange(index, e.target.value)} 
                                                                        className="w-full bg-neutral-950 border border-neutral-800 rounded-lg px-4 py-3 pr-12 text-sm font-mono text-neutral-300 focus:outline-none focus:ring-2 focus:ring-emerald-500/50 focus:border-emerald-500 transition-all group-hover/input:border-neutral-600" 
                                                                        placeholder="textures\..." 
                                                                    />
                                                                    <div className="absolute right-3 top-1/2 -translate-y-1/2 text-xs font-bold text-neutral-700 pointer-events-none select-none group-hover/input:text-neutral-500 transition-colors">
                                                                        DDS
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            </div>
                                        )}

                                        {/* TAB 2: RAW STRING EDITOR */}
                                        {activeTab === 'raw' && (
                                            <div className="bg-neutral-900 border border-neutral-800 rounded-xl overflow-hidden shadow-lg animate-in fade-in flex flex-col h-full min-h-[400px]">
                                                <div className="border-b border-neutral-800 bg-neutral-900 px-4 py-3 flex justify-between items-center">
                                                    <div className="flex items-center gap-2">
                                                        <Code className="w-4 h-4 text-amber-500" />
                                                        <h3 className="font-medium text-sm text-neutral-200">Raw String Table</h3>
                                                    </div>
                                                    <span className="text-xs text-amber-500/80 bg-amber-500/10 px-2 py-1 rounded border border-amber-500/20 flex items-center gap-1"><AlertTriangle className="w-3 h-3"/> ADVANCED MODE</span>
                                                </div>
                                                <div className="p-4 flex-grow flex flex-col">
                                                    <p className="text-sm text-neutral-400 mb-4">
                                                        Edit extracted texture strings directly. <strong className="text-amber-400">Warning:</strong> Altering string paths without accounting for byte offsets may cause in-game corruption if the exporter does not pad the binary correctly.
                                                    </p>
                                                    <textarea 
                                                        value={activeTextures.join('\n')}
                                                        onChange={handleRawTextChange}
                                                        className="w-full flex-grow bg-neutral-950 border border-neutral-800 rounded-lg p-4 text-sm font-mono text-neutral-300 focus:outline-none focus:ring-2 focus:ring-amber-500/50 resize-none whitespace-pre"
                                                        spellCheck="false"
                                                    />
                                                </div>
                                            </div>
                                        )}

                                        {/* TAB 3: VERIFIER MODULE & LOGS */}
                                        {activeTab === 'verifier' && (
                                            <div className="bg-neutral-900 border border-neutral-800 rounded-xl overflow-hidden shadow-lg animate-in fade-in flex flex-col h-full min-h-[400px]">
                                                <div className="border-b border-neutral-800 bg-neutral-900 px-4 py-3 flex items-center gap-2">
                                                    <Terminal className="w-4 h-4 text-emerald-500" />
                                                    <h3 className="font-medium text-sm text-neutral-200">Verbose Telemetry Console</h3>
                                                </div>
                                                <div className="p-0 flex-grow bg-neutral-950 overflow-hidden relative">
                                                    <div className="absolute inset-0 p-4 font-mono text-[11px] sm:text-xs space-y-1.5 overflow-y-auto custom-scrollbar">
                                                        {debugLogs.length === 0 && (
                                                            <div className="text-neutral-600 italic">Waiting for process telemetry...</div>
                                                        )}
                                                        {debugLogs.map((log, i) => {
                                                            let color = "text-neutral-400";
                                                            let tagColor = "bg-neutral-800 text-neutral-400";
                                                            
                                                            if (log.level === 'SUCCESS') { color = "text-emerald-400"; tagColor = "bg-emerald-900/40 text-emerald-400"; }
                                                            if (log.level === 'ERROR') { color = "text-red-400"; tagColor = "bg-red-900/40 text-red-400"; }
                                                            if (log.level === 'WARN') { color = "text-amber-400"; tagColor = "bg-amber-900/40 text-amber-400"; }
                                                            if (log.level === 'INFO') { color = "text-blue-300"; tagColor = "bg-blue-900/40 text-blue-300"; }
                                                            if (log.level === 'DEBUG') { color = "text-neutral-500"; tagColor = "bg-neutral-800 text-neutral-500"; }

                                                            return (
                                                                <div key={i} className="flex items-start gap-2 hover:bg-neutral-900/50 p-0.5 rounded transition-colors break-words">
                                                                    <span className="text-neutral-600 shrink-0 select-none">[{log.timestamp}]</span>
                                                                    <span className={`shrink-0 w-16 text-center rounded text-[9px] font-bold tracking-wider ${tagColor} select-none`}>
                                                                        {log.level}
                                                                    </span>
                                                                    <span className={`${color}`}>{log.message}</span>
                                                                </div>
                                                            );
                                                        })}
                                                        <div ref={(el) => { if(el) el.scrollIntoView({ behavior: 'smooth' }); }} />
                                                    </div>
                                                </div>
                                            </div>
                                        )}

                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <style>
        /* Custom scrollbar for terminal */
        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #0a0a0a; 
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #262626; 
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #404040; 
        }
    </style>
</body>
</html>
