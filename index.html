<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mojave Material Workshop | f76.world</title>
    
    <!-- Systemic Decoupling: Modern Resilient CDNs (July 2026 Baseline) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        mojave: {
                            950: '#0c0a05',
                            900: '#151108',
                            800: '#2b2011',
                            700: '#402c12',
                            amber: '#ffb833',
                            amberDim: '#cc8e14',
                            amberDark: '#664405'
                        }
                    },
                    fontFamily: {
                        sans: ['"Inter"', 'system-ui', '-apple-system', 'sans-serif'],
                        mono: ['"Courier New"', 'Courier', 'monospace'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-mojave-950 text-mojave-amber/80 overflow-y-scroll custom-scrollbar selection:bg-mojave-amber/30">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useCallback, useMemo } = React;

        // --- INLINE ICONS ---
        const FolderOpen = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>;
        const Save = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>;
        const Copy = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>;
        const AlertTriangle = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>;
        const Info = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>;
        const Settings2 = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 7h-9"/><path d="M14 17H5"/><circle cx="17" cy="17" r="3"/><circle cx="7" cy="7" r="3"/></svg>;
        const Image = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>;
        const Undo = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg>;
        const Redo = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 7v6h-6"/><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3l3 2.7"/></svg>;
        const Code = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>;
        const List = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>;
        const Wrench = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>;

        // --- CORE PARSER MODULE ---
        const MaterialParser = {
            analyzeFile: (buffer) => {
                const view = new DataView(buffer);
                const logs = [];
                let isFallout76Valid = true;

                if (buffer.byteLength < 8) {
                    return { valid: false, logs: [{ type: 'error', msg: "File is too small to be a valid material." }] };
                }

                const magic = String.fromCharCode(view.getUint8(0), view.getUint8(1), view.getUint8(2), view.getUint8(3));
                if (magic === 'BGSM' || magic === 'BGEM') {
                    logs.push({ type: 'success', msg: `Great! Found a valid ${magic} file.` });
                } else {
                    logs.push({ type: 'error', msg: `Hold on! Expected a BGSM or BGEM file, but found ${magic}.` });
                    isFallout76Valid = false;
                }

                const version = view.getUint32(4, true);
                if (version === 20 || version === 2) {
                    logs.push({ type: 'info', msg: `Format version v${version} recognized.` });
                } else {
                    logs.push({ type: 'warn', msg: `This format version (v${version}) is unusual. It might still work, though!` });
                }

                return { valid: isFallout76Valid, logs, magic, version };
            }
        };

        const rebuildFile = (originalBuffer, baseMappings, currentStrings) => {
            if (!originalBuffer || !baseMappings || !currentStrings) throw new Error("Missing binary data for rebuilding.");
            
            const chunks = [];
            let cursor = 0;
            const origUint8 = new Uint8Array(originalBuffer);
            const view = new DataView(originalBuffer);

            const operations = baseMappings.map((map, i) => ({
                ...map,
                current: currentStrings[i]
            })).sort((a, b) => a.offset - b.offset);

            for (const op of operations) {
                const isNullTerminated = origUint8[op.offset + op.original.length] === 0;
                const originalTotalLen = op.original.length + (isNullTerminated ? 1 : 0);

                let hasPrefix = false;
                let origPrefixVal = 0;
                if (op.offset >= 4) {
                    origPrefixVal = view.getUint32(op.offset - 4, true);
                    if (origPrefixVal === op.original.length || origPrefixVal === op.original.length + 1) {
                        hasPrefix = true;
                    }
                }

                const spliceStart = hasPrefix ? op.offset - 4 : op.offset;
                chunks.push(origUint8.slice(cursor, spliceStart));

                if (hasPrefix) {
                    const prefixBuf = new ArrayBuffer(4);
                    const prefixValToWrite = (origPrefixVal > op.original.length) ? op.current.length + 1 : op.current.length;
                    new DataView(prefixBuf).setUint32(0, prefixValToWrite, true);
                    chunks.push(new Uint8Array(prefixBuf));
                }

                const strBuf = new Uint8Array(op.current.length);
                for(let i=0; i<op.current.length; i++) {
                    strBuf[i] = op.current.charCodeAt(i);
                }
                chunks.push(strBuf);

                if (isNullTerminated) {
                    chunks.push(new Uint8Array([0]));
                }

                cursor = op.offset + originalTotalLen;
            }

            chunks.push(origUint8.slice(cursor));

            let totalLen = chunks.reduce((acc, c) => acc + c.byteLength, 0);
            const finalBuf = new Uint8Array(totalLen);
            let currentOffset = 0;
            for (const c of chunks) {
                finalBuf.set(c, currentOffset);
                currentOffset += c.byteLength;
            }

            return finalBuf.buffer;
        };

        const defaultFlags = {
            bAlphaBlend: false, bAlphaTest: false, bZBufferWrite: true,
            bTwoSided: false, bEnvironmentMapping: true, bScreenSpaceReflections: false
        };

        // --- MAIN APP COMPONENT ---
        function App() {
            const [fileData, setFileData] = useState(null);
            const [parsedData, setParsedData] = useState(null);
            const [isDragging, setIsDragging] = useState(false);
            const [error, setError] = useState(null);
            
            const [loadingProgress, setLoadingProgress] = useState(0);
            const [isProcessing, setIsProcessing] = useState(false);
            
            // True architectural Undo/Redo tracking both strings and flags
            const [history, setHistory] = useState([]);
            const [historyPos, setHistoryPos] = useState(-1);
            
            const [activeTab, setActiveTab] = useState('visual'); 
            const [activityLogs, setActivityLogs] = useState([]);
            
            const fileInputRef = useRef(null);

            const pushLog = useCallback((level, message) => {
                const timestamp = new Date().toLocaleTimeString([], { hour12: false });
                setActivityLogs(prev => [...prev, { timestamp, level, message }]);
            }, []);

            // Helper to get active state dynamically
            const activeState = historyPos >= 0 ? history[historyPos] : null;
            const activeTextures = activeState?.textures || [];
            const activeFlags = activeState?.flags || defaultFlags;

            const commitState = (newState) => {
                const newHistory = history.slice(0, historyPos + 1);
                newHistory.push(newState);
                setHistory(newHistory);
                setHistoryPos(newHistory.length - 1);
            };

            const undo = () => { if (historyPos > 0) setHistoryPos(historyPos - 1); };
            const redo = () => { if (historyPos < history.length - 1) setHistoryPos(historyPos + 1); };

            const handleTextureChange = (index, newValue) => {
                const newTextures = [...activeTextures];
                newTextures[index] = newValue;
                commitState({ textures: newTextures, flags: activeFlags });
            };

            const handleFlagToggle = (key) => {
                const newFlags = { ...activeFlags, [key]: !activeFlags[key] };
                pushLog('info', `Changed setting: ${key} is now ${newFlags[key] ? 'On' : 'Off'}`);
                commitState({ textures: activeTextures, flags: newFlags });
            };

            // Friendly Modding Tips
            const moddingTips = useMemo(() => {
                const alerts = [];
                const f = activeFlags;

                if (f.bAlphaBlend && f.bAlphaTest) {
                    alerts.push({ level: 'error', msg: 'Having both Alpha Blend and Alpha Test enabled usually causes flickering. Pick one!' });
                }
                if (f.bScreenSpaceReflections && !f.bEnvironmentMapping) {
                    alerts.push({ level: 'warn', msg: 'Tip: If you use Screen Space Reflections, enable Environment Mapping too so the object isn\'t completely black in shadows.' });
                }
                if (f.bTwoSided && f.bZBufferWrite) {
                    alerts.push({ level: 'info', msg: 'Double-sided objects might look strange if they overlap themselves.' });
                }
                if (!f.bZBufferWrite && !f.bAlphaBlend && !f.bAlphaTest) {
                    alerts.push({ level: 'warn', msg: 'Z-Buffer Write is off for a solid object. It might render behind walls or look like a flat sticker.' });
                }

                if (alerts.length === 0) {
                    alerts.push({ level: 'success', msg: 'Your current settings look completely fine for Fallout 76!' });
                }
                return alerts;
            }, [activeFlags]);

            const processFile = async (file) => {
                if (!file) return;
                
                setError(null);
                setParsedData(null);
                setActivityLogs([]);
                setIsProcessing(true);
                setLoadingProgress(0);
                
                pushLog('info', `Opening ${file.name}...`);

                try {
                    setLoadingProgress(20);
                    const buffer = await file.arrayBuffer();
                    const diagnostics = MaterialParser.analyzeFile(buffer);
                    
                    diagnostics.logs.forEach(l => pushLog(l.type, l.msg));
                    
                    if (!diagnostics.valid) {
                        throw new Error(diagnostics.logs.find(l => l.type === 'error')?.msg || "Couldn't read file properly.");
                    }

                    setLoadingProgress(50);
                    
                    const uint8 = new Uint8Array(buffer);
                    let binStr = "";
                    for(let i=0; i<uint8.length; i++) {
                        binStr += String.fromCharCode(uint8[i]);
                    }
                    
                    const pathRegex = /([a-zA-Z0-9_\\\-\.\/]+\.(?:dds|bgsm|bgem|nif|tx))/gi;
                    const mappings = [];
                    const initialStrings = [];
                    let match;
                    
                    while ((match = pathRegex.exec(binStr)) !== null) {
                        const str = match[1];
                        const offset = match.index;
                        
                        if (!mappings.some(m => m.offset === offset)) {
                            mappings.push({ original: str, offset: offset });
                            initialStrings.push(str);
                        }
                    }

                    if (mappings.length === 0) {
                        pushLog('warn', 'Didn\'t find any texture paths in this file. You can still save it, though.');
                    } else {
                        pushLog('success', `Found ${mappings.length} texture links!`);
                    }

                    setLoadingProgress(100);

                    setFileData({
                        name: file.name,
                        size: (file.size / 1024).toFixed(2) + ' KB',
                        lastModified: new Date(file.lastModified).toLocaleDateString()
                    });
                    
                    const data = { magic: diagnostics.magic, version: diagnostics.version, mappings, initialStrings, rawBuffer: buffer };
                    setParsedData(data);
                    
                    // Initialize History State
                    commitState({ textures: data.initialStrings, flags: defaultFlags });
                    setHistoryPos(0); // Reset position for new file

                } catch (err) {
                    pushLog('error', err.message);
                    setError(err.message);
                } finally {
                    setTimeout(() => setIsProcessing(false), 500);
                }
            };

            const handleDragOver = (e) => { e.preventDefault(); setIsDragging(true); };
            const handleDragLeave = () => { setIsDragging(false); };
            const handleDrop = (e) => {
                e.preventDefault();
                setIsDragging(false);
                if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
                    processFile(e.dataTransfer.files[0]);
                }
            };

            const handleFileSelect = (e) => {
                const file = e.target.files[0];
                if (file) processFile(file);
                if (fileInputRef.current) fileInputRef.current.value = '';
            };

            const duplicateFile = () => {
                if (!parsedData || !fileData) return;
                const newName = window.prompt("Name your new file copy:", `copy_of_${fileData.name}`);
                if (newName) {
                    const finalName = newName.endsWith('.bgsm') || newName.endsWith('.bgem') ? newName : `${newName}.${parsedData.magic.toLowerCase()}`;
                    setFileData(prev => ({ ...prev, name: finalName }));
                    pushLog('success', `Created duplicate as: ${finalName}`);
                }
            };

            const handleExport = () => {
                if (!parsedData || !activeState) return;
                
                const hasWarnings = moddingTips.some(p => p.level === 'error' || p.level === 'warn');
                let promptMsg = "Are you sure you want to save?\nMake sure you have a backup of the original file!";
                if (hasWarnings) promptMsg += "\n\nNote: You have some warnings in your settings. The material might look glitchy in-game.";

                if (!window.confirm(promptMsg)) return;

                try {
                    const currentStrings = activeState.textures;
                    const newBuffer = rebuildFile(parsedData.rawBuffer, parsedData.mappings, currentStrings);

                    const blob = new Blob([newBuffer], { type: 'application/octet-stream' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = fileData.name;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                    pushLog('success', `Saved successfully to your downloads!`);
                } catch (err) {
                    pushLog('error', `Couldn't save: ${err.message}`);
                    alert(`Failed to save: ${err.message}`);
                }
            };

            const renderingFlagsMeta = [
                { id: 'bAlphaBlend', name: 'Alpha Blend', desc: 'Smooth transparency (used for glass, water, visors).' },
                { id: 'bAlphaTest', name: 'Alpha Test', desc: 'Hard cut-out transparency (used for leaves, chainlink fences).' },
                { id: 'bZBufferWrite', name: 'Z-Buffer Write', desc: 'Tells the game this object is solid and blocks things behind it.' },
                { id: 'bTwoSided', name: 'Double Sided', desc: 'Renders the inside/back of the model (great for capes or flags).' },
                { id: 'bEnvironmentMapping', name: 'Environment Map', desc: 'Adds generic fake reflections so metal and wet things look shiny.' },
                { id: 'bScreenSpaceReflections', name: 'Real-Time Reflections', desc: 'High-quality dynamic puddles and chrome. Heavy on performance!' }
            ];

            return (
                <div className="min-h-screen flex flex-col font-sans">
                    
                    {/* TOP NAVIGATION */}
                    <nav className="bg-mojave-900 border-b-2 border-mojave-amber/20 shadow-md sticky top-0 z-50 transition-all">
                        {isProcessing && (
                            <div className="absolute top-full left-0 h-1 bg-mojave-amber z-50 transition-all duration-300 ease-out shadow-[0_0_10px_rgba(255,184,51,0.5)]" style={{ width: `${loadingProgress}%` }}></div>
                        )}
                        
                        <div className="max-w-[1600px] mx-auto px-4 sm:px-6 h-[72px] flex items-center justify-between">
                            
                            {/* App Title & Logo */}
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 rounded bg-mojave-800 border border-mojave-amber/30 flex items-center justify-center shadow-inner">
                                    <Wrench className="w-5 h-5 text-mojave-amber" />
                                </div>
                                <div className="flex flex-col hidden sm:flex">
                                    <h1 className="font-extrabold text-xl tracking-wide text-mojave-amber drop-shadow-sm">
                                        Mojave <span className="text-white/90">Material Workshop</span>
                                    </h1>
                                    <span className="text-xs text-mojave-amber/60 font-medium">Fallout 76 Community Tools</span>
                                </div>
                            </div>

                            {/* Center Controls: Undo/Redo Matrix */}
                            {parsedData && (
                                <div className="flex items-center gap-1 bg-mojave-950 rounded-lg p-1 border border-mojave-amber/10 shadow-inner">
                                    <button onClick={undo} disabled={historyPos <= 0} className={`p-2 rounded-md transition-colors ${historyPos > 0 ? 'hover:bg-mojave-800 text-mojave-amber' : 'text-mojave-amber/20 cursor-not-allowed'}`} title="Undo">
                                        <Undo className="w-5 h-5" />
                                    </button>
                                    <div className="w-px h-6 bg-mojave-amber/10 mx-1"></div>
                                    <button onClick={redo} disabled={historyPos >= history.length - 1} className={`p-2 rounded-md transition-colors ${historyPos < history.length - 1 ? 'hover:bg-mojave-800 text-mojave-amber' : 'text-mojave-amber/20 cursor-not-allowed'}`} title="Redo">
                                        <Redo className="w-5 h-5" />
                                    </button>
                                </div>
                            )}

                            {/* Main Actions */}
                            <div className="flex items-center gap-2 sm:gap-3">
                                {parsedData && (
                                    <button onClick={duplicateFile} disabled={isProcessing} className="hidden md:flex px-4 py-2 rounded-md bg-mojave-950 border border-mojave-amber/20 hover:bg-mojave-800 text-mojave-amber/90 text-sm font-semibold transition-colors items-center gap-2 shadow-sm">
                                        <Copy className="w-4 h-4" /> Duplicate
                                    </button>
                                )}
                                <button onClick={() => fileInputRef.current?.click()} disabled={isProcessing} className="px-4 py-2 rounded-md bg-mojave-800 border border-mojave-amber/30 hover:bg-mojave-700 text-mojave-amber text-sm font-bold transition-colors items-center gap-2 shadow-sm flex">
                                    <FolderOpen className="w-4 h-4" /> <span className="hidden sm:inline">Open File</span>
                                </button>
                                <input type="file" ref={fileInputRef} onChange={handleFileSelect} accept=".bgsm,.bgem" className="hidden" />
                                
                                <button onClick={handleExport} disabled={!parsedData || isProcessing} className={`px-5 py-2 rounded-md text-sm font-bold transition-all flex items-center gap-2 shadow-sm ${parsedData && !isProcessing ? 'bg-mojave-amber hover:bg-yellow-400 text-mojave-950 shadow-[0_0_15px_rgba(255,184,51,0.2)]' : 'bg-mojave-900 border border-mojave-amber/10 text-mojave-amber/30 cursor-not-allowed'}`}>
                                    <Save className="w-4 h-4" /> <span className="hidden sm:inline">Save Material</span>
                                </button>
                            </div>
                        </div>
                    </nav>

                    <main className="flex-grow max-w-[1600px] w-full mx-auto px-4 py-6 sm:px-6 sm:py-8 flex flex-col z-10">
                        {error && (
                            <div className="mb-6 p-4 bg-red-950/40 border-l-4 border-red-500 rounded-md flex items-start gap-3 shadow-sm">
                                <AlertTriangle className="w-6 h-6 text-red-500 shrink-0 mt-0.5" />
                                <div>
                                    <h3 className="text-red-400 font-bold text-base">Oops! Something went wrong.</h3>
                                    <p className="text-red-400/80 text-sm mt-1">{error}</p>
                                </div>
                            </div>
                        )}

                        {/* WELCOME DROPZONE */}
                        {!parsedData && !error && (
                            <div onDragOver={handleDragOver} onDragLeave={handleDragLeave} onDrop={handleDrop} className={`flex-grow min-h-[50vh] w-full rounded-2xl border-4 border-dashed flex flex-col items-center justify-center transition-all duration-200 cursor-pointer ${isDragging ? 'border-mojave-amber bg-mojave-amber/5 scale-[1.01]' : 'border-mojave-amber/20 bg-mojave-900/50 hover:border-mojave-amber/40 hover:bg-mojave-800/50'}`} onClick={() => fileInputRef.current?.click()}>
                                <div className={`p-6 rounded-full mb-6 transition-colors duration-200 ${isDragging ? 'bg-mojave-amber text-mojave-950' : 'bg-mojave-950 text-mojave-amber/40'}`}>
                                    <FolderOpen className="w-16 h-16" />
                                </div>
                                <h2 className="text-2xl sm:text-3xl font-extrabold mb-3 text-mojave-amber text-center">Ready for a Material File</h2>
                                <p className="text-mojave-amber/60 max-w-md text-center text-base sm:text-lg">
                                    Drag and drop your <strong className="text-mojave-amber">.bgsm</strong> or <strong className="text-mojave-amber">.bgem</strong> file here, or click to browse your PC.
                                </p>
                            </div>
                        )}

                        {/* MAIN EDITOR AREA */}
                        {parsedData && activeState && (
                            <div className="flex-grow flex flex-col animate-in fade-in duration-300">
                                <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 flex-grow">
                                    
                                    {/* LEFT COLUMN: FILE INFO & SETTINGS */}
                                    <div className="col-span-1 lg:col-span-4 xl:col-span-3 space-y-6 flex flex-col">
                                        
                                        {/* File Info Card */}
                                        <div className="bg-mojave-900 rounded-xl shadow-md border border-mojave-amber/20 overflow-hidden">
                                            <div className="bg-mojave-950 px-5 py-4 border-b border-mojave-amber/10 flex items-center gap-2">
                                                <Info className="w-5 h-5 text-mojave-amber" />
                                                <h3 className="font-bold text-sm text-mojave-amber">File Information</h3>
                                            </div>
                                            <div className="p-5 space-y-4">
                                                <div>
                                                    <label className="text-xs text-mojave-amber/50 font-semibold uppercase tracking-wider">File Name</label>
                                                    <div className="mt-1 text-sm text-mojave-amber font-medium bg-mojave-950 px-3 py-2 rounded-md border border-mojave-amber/10 break-all">{fileData?.name}</div>
                                                </div>
                                                <div className="grid grid-cols-2 gap-4">
                                                    <div>
                                                        <label className="text-xs text-mojave-amber/50 font-semibold uppercase tracking-wider">Size</label>
                                                        <div className="mt-1 text-sm text-mojave-amber font-medium bg-mojave-950 px-3 py-2 rounded-md border border-mojave-amber/10">{fileData?.size}</div>
                                                    </div>
                                                    <div>
                                                        <label className="text-xs text-mojave-amber/50 font-semibold uppercase tracking-wider">Type</label>
                                                        <div className="mt-1 text-sm text-mojave-amber font-medium bg-mojave-950 px-3 py-2 rounded-md border border-mojave-amber/10 font-mono">{parsedData.magic}</div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>

                                        {/* Material Settings Card */}
                                        <div className="bg-mojave-900 rounded-xl shadow-md border border-mojave-amber/20 flex-grow flex flex-col overflow-hidden">
                                            <div className="bg-mojave-950 px-5 py-4 border-b border-mojave-amber/10 flex items-center gap-2">
                                                <Settings2 className="w-5 h-5 text-mojave-amber" />
                                                <h3 className="font-bold text-sm text-mojave-amber">Material Settings</h3>
                                            </div>
                                            <div className="p-5 flex flex-col gap-5 overflow-y-auto max-h-[350px] lg:max-h-full custom-scrollbar">
                                                {renderingFlagsMeta.map((flag) => (
                                                    <label key={flag.id} className="flex items-start gap-4 cursor-pointer group">
                                                        <div className="relative flex items-center justify-center mt-0.5">
                                                            <input 
                                                                type="checkbox" 
                                                                checked={activeFlags[flag.id]}
                                                                onChange={() => handleFlagToggle(flag.id)}
                                                                className="peer w-5 h-5 rounded border-2 border-mojave-amber/30 bg-mojave-950 text-mojave-amber focus:ring-mojave-amber/50 cursor-pointer transition-all checked:bg-mojave-amber checked:border-mojave-amber appearance-none" 
                                                            />
                                                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#0c0a05" strokeWidth="4" strokeLinecap="round" strokeLinejoin="round" className="absolute inset-0 w-5 h-5 p-0.5 pointer-events-none opacity-0 peer-checked:opacity-100 transition-opacity">
                                                                <polyline points="20 6 9 17 4 12"/>
                                                            </svg>
                                                        </div>
                                                        <div>
                                                            <span className="text-sm font-bold text-mojave-amber/90 group-hover:text-mojave-amber transition-colors block">{flag.name}</span>
                                                            <p className="text-xs text-mojave-amber/50 mt-0.5 leading-snug">{flag.desc}</p>
                                                        </div>
                                                    </label>
                                                ))}
                                            </div>
                                            
                                            {/* Modding Tips Box */}
                                            <div className="mt-auto border-t border-mojave-amber/10 bg-mojave-950 p-5">
                                                <h4 className="text-xs font-bold text-mojave-amber/50 mb-3 flex items-center gap-2 uppercase tracking-wide">
                                                    Modding Tips
                                                </h4>
                                                <div className="space-y-3">
                                                    {moddingTips.map((tip, i) => {
                                                        let boxStyle = "bg-green-900/20 border-green-500/30 text-green-400";
                                                        let icon = <Info className="w-4 h-4 mt-0.5 shrink-0 text-green-500" />;
                                                        
                                                        if (tip.level === 'error') {
                                                            boxStyle = "bg-red-900/20 border-red-500/30 text-red-400";
                                                            icon = <AlertTriangle className="w-4 h-4 mt-0.5 shrink-0 text-red-500" />;
                                                        } else if (tip.level === 'warn') {
                                                            boxStyle = "bg-orange-900/20 border-orange-500/30 text-orange-400";
                                                            icon = <AlertTriangle className="w-4 h-4 mt-0.5 shrink-0 text-orange-500" />;
                                                        } else if (tip.level === 'info') {
                                                            boxStyle = "bg-blue-900/20 border-blue-500/30 text-blue-400";
                                                            icon = <Info className="w-4 h-4 mt-0.5 shrink-0 text-blue-500" />;
                                                        }

                                                        return (
                                                            <div key={i} className={`flex items-start gap-3 p-3 text-sm border rounded-lg shadow-sm ${boxStyle}`}>
                                                                {icon}
                                                                <span className="leading-snug">{tip.msg}</span>
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    {/* RIGHT COLUMN: TEXTURE EDITOR & TABS */}
                                    <div className="col-span-1 lg:col-span-8 xl:col-span-9 flex flex-col bg-mojave-900 rounded-xl shadow-md border border-mojave-amber/20 overflow-hidden min-h-[550px]">
                                        
                                        {/* Standard Friendly Tabs */}
                                        <div className="flex bg-mojave-950 border-b border-mojave-amber/10 overflow-x-auto custom-scrollbar">
                                            <button onClick={() => setActiveTab('visual')} className={`px-6 py-4 text-sm font-bold transition-all flex items-center gap-2 whitespace-nowrap border-b-2 ${activeTab === 'visual' ? 'border-mojave-amber text-mojave-amber bg-mojave-900' : 'border-transparent text-mojave-amber/50 hover:text-mojave-amber hover:bg-mojave-900/50'}`}>
                                                <Image className="w-4 h-4" /> Textures & Maps
                                            </button>
                                            <button onClick={() => setActiveTab('raw')} className={`px-6 py-4 text-sm font-bold transition-all flex items-center gap-2 whitespace-nowrap border-b-2 ${activeTab === 'raw' ? 'border-mojave-amber text-mojave-amber bg-mojave-900' : 'border-transparent text-mojave-amber/50 hover:text-mojave-amber hover:bg-mojave-900/50'}`}>
                                                <Code className="w-4 h-4" /> Advanced (Raw Hex)
                                            </button>
                                            <button onClick={() => setActiveTab('log')} className={`px-6 py-4 text-sm font-bold transition-all flex items-center gap-2 whitespace-nowrap border-b-2 ${activeTab === 'log' ? 'border-mojave-amber text-mojave-amber bg-mojave-900' : 'border-transparent text-mojave-amber/50 hover:text-mojave-amber hover:bg-mojave-900/50'}`}>
                                                <List className="w-4 h-4" /> Activity Log
                                            </button>
                                        </div>

                                        {/* TAB CONTENT AREAS */}
                                        <div className="flex-grow flex flex-col relative overflow-hidden bg-mojave-900">
                                            
                                            {/* TAB 1: VISUAL EDITOR */}
                                            {activeTab === 'visual' && (
                                                <div className="absolute inset-0 p-6 overflow-y-auto flex flex-col gap-5 custom-scrollbar">
                                                    <div className="mb-2 flex justify-between items-center">
                                                        <p className="text-mojave-amber/60 text-sm">Update the paths to your custom `.dds` textures below. Paths usually start with <code className="bg-mojave-950 px-1.5 py-0.5 rounded border border-mojave-amber/20 text-mojave-amber font-mono">textures\</code>.</p>
                                                        <span className="text-xs bg-mojave-950 border border-mojave-amber/20 text-mojave-amber/60 px-2 py-1 rounded font-bold">{activeTextures.length} Found</span>
                                                    </div>

                                                    {activeTextures.map((tex, index) => {
                                                        let label = "Texture Map";
                                                        let subLabel = "General Surface";
                                                        const tLower = tex.toLowerCase();
                                                        
                                                        if (tLower.includes('_d.') || tLower.includes('_color')) { label = "Base Color (Diffuse)"; subLabel = "The main painting of the object"; }
                                                        else if (tLower.includes('_n.') || tLower.includes('_normal')) { label = "Normal Map"; subLabel = "Adds fake 3D bumps and scratches"; }
                                                        else if (tLower.includes('_s.') || tLower.includes('_spec') || tLower.includes('_r.')) { label = "Specular / Roughness"; subLabel = "Controls how shiny or dull it looks"; }
                                                        else if (tLower.includes('_g.') || tLower.includes('_glow') || tLower.includes('_e.')) { label = "Glow Map"; subLabel = "Parts that light up in the dark"; }
                                                        else if (tLower.includes('_l.') || tLower.includes('_light')) { label = "Lighting Map"; subLabel = "Baked shadows"; }
                                                        
                                                        return (
                                                            <div key={index} className="bg-mojave-950 p-4 rounded-lg border border-mojave-amber/10 shadow-sm transition-all hover:border-mojave-amber/40">
                                                                <div className="flex justify-between items-start mb-3">
                                                                    <div>
                                                                        <label className="text-sm font-bold text-mojave-amber block">{label}</label>
                                                                        <span className="text-xs text-mojave-amber/50">{subLabel}</span>
                                                                    </div>
                                                                    <span className="text-xs text-mojave-amber/40 bg-mojave-900 px-2 py-1 rounded border border-mojave-amber/10 font-mono">Index: {index}</span>
                                                                </div>
                                                                <textarea 
                                                                    value={tex} 
                                                                    onChange={(e) => handleTextureChange(index, e.target.value)} 
                                                                    rows="2"
                                                                    spellCheck="false"
                                                                    className="w-full bg-mojave-900 border border-mojave-amber/20 rounded-md px-4 py-3 text-sm text-mojave-amber/90 font-mono focus:outline-none focus:ring-1 focus:ring-mojave-amber focus:border-mojave-amber transition-all shadow-inner resize-none break-all" 
                                                                    placeholder="textures\..." 
                                                                />
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            )}

                                            {/* TAB 2: RAW STRINGS (Advanced) */}
                                            {activeTab === 'raw' && (
                                                <div className="absolute inset-0 flex flex-col p-6">
                                                    <div className="bg-orange-900/20 border-l-4 border-orange-500 p-4 mb-6 rounded-r-md">
                                                        <h4 className="font-bold text-orange-400 text-sm">Advanced Hex Editing</h4>
                                                        <p className="text-orange-400/80 text-xs mt-1">This mode lets you directly edit the string arrays pulled from the binary file. We handle calculating the `uint32` prefixes for you when you save!</p>
                                                    </div>
                                                    
                                                    <div className="space-y-2 overflow-y-auto flex-grow rounded-md border border-mojave-amber/10 bg-mojave-950 p-2 custom-scrollbar">
                                                        {activeTextures.map((tex, i) => (
                                                            <div key={i} className="flex items-stretch bg-mojave-900 border border-mojave-amber/20 rounded-md overflow-hidden focus-within:border-mojave-amber focus-within:ring-1 focus-within:ring-mojave-amber transition-all">
                                                                <div className="w-12 flex items-center justify-center bg-mojave-950 border-r border-mojave-amber/20 text-xs text-mojave-amber/40 font-mono font-bold shrink-0">
                                                                    {(i*4).toString(16).padStart(2,'0').toUpperCase()}
                                                                </div>
                                                                <textarea
                                                                    value={tex}
                                                                    onChange={(e) => handleTextureChange(i, e.target.value)}
                                                                    rows="1"
                                                                    className="flex-grow bg-transparent border-none px-4 py-2.5 text-sm text-mojave-amber/90 font-mono focus:outline-none resize-none break-all"
                                                                    spellCheck="false"
                                                                />
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            )}

                                            {/* TAB 3: ACTIVITY LOG */}
                                            {activeTab === 'log' && (
                                                <div className="absolute inset-0 bg-[#070603] text-mojave-amber/70 font-mono text-xs sm:text-sm p-5 overflow-y-auto custom-scrollbar">
                                                    {activityLogs.length === 0 && (
                                                        <div className="text-mojave-amber/40 italic">No activity yet. Open a file to get started!</div>
                                                    )}
                                                    <div className="space-y-2">
                                                        {activityLogs.map((log, i) => {
                                                            let color = "text-mojave-amber/50";
                                                            let tag = "[INFO]";
                                                            
                                                            if (log.level === 'success') { color = "text-green-400"; tag = "[OK]  "; }
                                                            if (log.level === 'error') { color = "text-red-400"; tag = "[ERR] "; }
                                                            if (log.level === 'warn') { color = "text-orange-400"; tag = "[WARN]"; }

                                                            return (
                                                                <div key={i} className="flex items-start gap-3 border-b border-mojave-amber/10 pb-1">
                                                                    <span className="text-mojave-amber/30 shrink-0">[{log.timestamp}]</span>
                                                                    <span className={`${color} font-bold shrink-0`}>{tag}</span>
                                                                    <span className="text-mojave-amber/80 break-words">{log.message}</span>
                                                                </div>
                                                            );
                                                        })}
                                                    </div>
                                                    <div ref={(el) => { if(el) el.scrollIntoView({ behavior: 'smooth' }); }} />
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                    
                    {/* INFORMATIVE FOOTER */}
                    <footer className="mt-auto border-t border-mojave-amber/20 bg-mojave-950 py-10 px-4 z-10 shadow-[0_-5px_20px_rgba(0,0,0,0.5)]">
                        <div className="max-w-[1600px] mx-auto grid grid-cols-1 md:grid-cols-2 gap-10 text-sm">
                            <div>
                                <h4 className="flex items-center gap-2 text-mojave-amber font-bold text-base mb-3 tracking-wide">
                                    <Wrench className="w-4 h-4"/> What is this tool?
                                </h4>
                                <p className="text-mojave-amber/60 leading-relaxed">
                                    The Mojave Material Workshop is a fully localized, browser-based utility designed for modifying Fallout 76 Material Files (<code className="bg-mojave-900 px-1 py-0.5 rounded border border-mojave-amber/10 text-mojave-amber/80">.bgsm</code> and <code className="bg-mojave-900 px-1 py-0.5 rounded border border-mojave-amber/10 text-mojave-amber/80">.bgem</code>). 
                                    It empowers modders to effortlessly redirect texture paths and adjust crucial rendering flags (such as Alpha Blending and Space Screen Reflections) without needing complex Hex Editor software. All binary parsing and file generation occurs instantly on your local machine—zero cloud uploads required.
                                </p>
                            </div>
                            <div>
                                <h4 className="flex items-center gap-2 text-mojave-amber font-bold text-base mb-3 tracking-wide">
                                    <List className="w-4 h-4"/> How to use
                                </h4>
                                <ul className="space-y-2 text-mojave-amber/60">
                                    <li className="flex gap-2">
                                        <strong className="text-mojave-amber shrink-0">1. Open:</strong>
                                        <span>Drag and drop your base material file into the workspace.</span>
                                    </li>
                                    <li className="flex gap-2">
                                        <strong className="text-mojave-amber shrink-0">2. Edit:</strong>
                                        <span>Use the <em>Textures & Maps</em> tab to point the material to your custom <code className="bg-mojave-900 px-1 py-0.5 rounded border border-mojave-amber/10 text-mojave-amber/80">.dds</code> texture paths. Modify Material Settings as needed on the left panel.</span>
                                    </li>
                                    <li className="flex gap-2">
                                        <strong className="text-mojave-amber shrink-0">3. Save:</strong>
                                        <span>Click <em>Save Material</em> in the top-right navigation. Your browser will instantly calculate the correct binary prefixes and download the ready-to-pack material.</span>
                                    </li>
                                </ul>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    
    <style>
        /* Mojave Custom Scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #0c0a05; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,184,51,0.2); border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(255,184,51,0.4); }
    </style>
</body>
</html>
